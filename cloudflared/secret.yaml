# DO NOT commit your real token here.
# Create this secret manually on the cluster:
#
#   kubectl create secret generic cloudflared-token \
#     --namespace cloudflared \
#     --from-literal=token=YOUR_TOKEN_HERE
#
# Or use External Secrets Operator / Sealed Secrets to manage this safely in Git.
#
# The manifest below is a placeholder for reference only.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: cloudflared
type: Opaque
stringData:
  token: REPLACE_ME   # Never commit a real value here
