# VSO syncs this secret from Vault → K8s automatically.
# The destination name and key match what cloudflared/deployment.yaml expects,
# so the Deployment needs zero changes after migrating from kubectl create secret.
#
# Write the secret into Vault first:
#   vault kv put homelab/cloudflared token='YOUR_TUNNEL_TOKEN_HERE'
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: cloudflared-token
  namespace: cloudflared
spec:
  vaultAuthRef: vault-secrets-operator-system/vault-auth
  mount: homelab
  type: kv-v2
  path: cloudflared
  refreshAfter: 1h
  destination:
    name: cloudflared-token
    create: true
