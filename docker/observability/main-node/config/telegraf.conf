[agent]
  interval = "5m"
  round_interval = true

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf"

[[inputs.exec]]
  commands = ["/usr/bin/speedtest --json"]
  name_override = "Speedtest"
  timeout = "1m"
  interval = "5m"
  data_format = "json"
  json_string_fields = [
    "server_name",
    "server_location",
    "server_host",
    "server_ip",
    "result_url",
    "client_ip",
    "client_isp",
    "client_country"
  ]